<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استاد مهدی عزیزی</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                
                <div class="flex items-center space-x-8 space-x-reverse">
                    <div class="flex-shrink-0">
                        <a href="#" class="text-xl font-black text-gray-950 tracking-tight">
                            آکادمی <span class="text-indigo-600">عزیزی</span>
                        </a>
                    </div>
                    <nav class="hidden md:flex space-x-6 space-x-reverse">
                        <a href="#" class="text-sm font-bold text-indigo-600">صفحه اصلی</a>
                        <a href="#packages" class="text-sm font-medium text-gray-600 hover:text-indigo-600 transition">پکیج‌های آموزشی</a>
                        <a href="#" class="text-sm font-medium text-gray-600 hover:text-indigo-600 transition">درباره ما</a>
                        <a href="#" class="text-sm font-medium text-gray-600 hover:text-indigo-600 transition">تماس با ما</a>
                    </nav>
                </div>

                <div class="flex items-center">
                    <a href="#" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-sm font-bold px-5 py-2.5 rounded-xl transition duration-250">
                        ورود / ثبت‌نام
                    </a>
                    
                    <button class="md:hidden mr-4 p-2 text-gray-600 hover:bg-gray-50 rounded-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>

            </div>
        </div>
    </header>

    <main class="bg-gray-50 min-h-screen py-12">
        
        <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">
            
            <div class="lg:col-span-5 text-right space-y-6">
                <h1 class="text-3xl sm:text-4xl lg:text-5xl font-black text-gray-900 leading-tight">
                    آکادمی تخصصی <span class="text-indigo-600">استاد مهدی عزیزی</span>
                </h1>
                <p class="text-base sm:text-lg text-gray-600 font-medium leading-relaxed">
                    پلتفرم جامع آموزش ویدئویی و پکیج‌های کنکوری تخصصی. مسیر یادگیری خود را کوتاه و حرفه‌ای کنید.
                </p>
                <div class="pt-2">
                    <a href="#packages" class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-8 py-3 rounded-xl shadow-lg shadow-indigo-200 transition duration-300">
                        مشاهده پکیج‌ها
                    </a>
                </div>
            </div>

            <div class="lg:col-span-7 bg-white p-6 rounded-2xl shadow-xl shadow-gray-100 border border-gray-100">
                <div class="flex space-x-4 space-x-reverse overflow-hidden pb-4">
                    
                    <div class="w-full sm:w-1/2 flex-shrink-0 bg-gray-100 h-80 rounded-xl border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400 font-bold">
                        پکیج شماره ۱ (بزودی)
                    </div>

                    <div class="hidden sm:flex w-1/2 flex-shrink-0 bg-gray-100 h-80 rounded-xl border-2 border-dashed border-gray-300 items-center justify-center text-gray-400 font-bold">
                        پکیج شماره ۲ (بزودی)
                    </div>

                </div>

                <div class="flex justify-end space-x-2 space-x-reverse mt-4">
                    <button class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold px-4 py-2 rounded-lg text-sm transition">
                        قبلی
                    </button>
                    <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 py-2 rounded-lg text-sm transition">
                        بعدی
                    </button>
                </div>
            </div>

        </section>

    </main>

    <footer>
        </footer>

</body>
</html>
