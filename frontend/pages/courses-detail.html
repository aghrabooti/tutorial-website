<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جزئیات محصول - آکادمی عزیزی</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Vazir', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                
                <!-- Logo & Navigation -->
                <div class="flex items-center space-x-8 space-x-reverse">
                    <div class="flex-shrink-0">
                        <a href="#" class="text-xl font-black text-gray-950 tracking-tight">
                            آکادمی <span class="text-indigo-600">عزیزی</span>
                        </a>
                    </div>

                    <nav class="hidden md:flex space-x-6 space-x-reverse">
                        <a href="../index.html" class="text-sm font-bold text-gray-600">صفحه اصلی</a>
                        <a href="#packages" class="text-sm font-medium text-indigo-600 hover:text-indigo-600 transition">پکیج‌های آموزشی</a>
                        <a href="#" class="text-sm font-medium text-gray-600 hover:text-indigo-600 transition">درباره ما</a>
                        <a href="#" class="text-sm font-medium text-gray-600 hover:text-indigo-600 transition">تماس با ما</a>
                    </nav>
                </div>

                <!-- Actions -->
                <div class="flex items-center">
                    <a href="#" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-sm font-bold px-5 py-2.5 rounded-xl transition duration-300">
                        ورود / ثبت‌نام
                    </a>
                    
                    <button class="md:hidden mr-4 p-2 text-gray-600 hover:bg-gray-50 rounded-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>

            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 md:py-12 w-full flex-grow">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <div class="lg:col-span-5 bg-white border border-gray-200/80 rounded-2xl p-6 shadow-sm sticky top-24">
                <h1 id="prod-title" class="text-2xl font-black text-gray-900 mb-4 leading-tight border-b border-gray-100 pb-4">در حال بارگذاری...</h1>
                
                <p id="prod-description" class="text-gray-600 text-sm leading-relaxed mb-6"></p>
                
                <div class="flex items-center justify-between mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                    <span class="text-gray-500 text-sm font-medium">مبلغ قابل پرداخت:</span>
                    <span id="prod-price" class="text-2xl font-black text-blue-600">۰ تومان</span>
                </div>
                
                <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-6 rounded-xl transition duration-300 shadow-md hover:shadow-lg hover:shadow-blue-600/20 flex items-center justify-center gap-2 active:scale-[0.98]">
                    <i class="fa-solid fa-basket-shopping text-sm"></i>
                    <span>ثبت و تکمیل خرید</span>
                </button>
            </div>

            <div class="lg:col-span-7 bg-white border border-gray-200/80 rounded-2xl p-4 shadow-sm flex flex-col gap-4">
                
                <div id="video-container" class="hidden aspect-video w-full rounded-xl overflow-hidden bg-gray-950 shadow-md ring-1 ring-black/5">
                    <video id="prod-video" controls class="w-full h-full object-cover">
                        <source src="" type="video/mp4">
                    </video>
                </div>

                <div class="w-full rounded-xl overflow-hidden bg-gray-50 border border-gray-100 shadow-sm ring-1 ring-black/5">
                    <img id="prod-image" src="" alt="پوستر پکیج" class="w-full h-auto max-h-[500px] object-cover block mx-auto">
                </div>
            </div>

        </div>
    </main>

    <footer class="border-t border-gray-200 bg-white py-5 text-center text-xs text-gray-500 font-medium">
        تمامی حقوق برای آکادمی آموزشی محفوظ است.
    </footer>

</body>
</html>
