<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">جزئیات دوره | آکادمی ریاضی مهدی عزیزی</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Vazir', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8">
            <a href="courses.html" class="text-indigo-600 hover:underline flex items-center gap-1 font-bold">
                <span>←</span> بازگشت به فروشگاه
            </a>
            <h1 id="course-title" class="text-2xl md:text-3xl font-black text-gray-900"></h1>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-8">
                <div id="purchase-view">
                    <div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-gray-100">
                        <div id="course-image-container" class="w-full h-64 md:h-96 rounded-2xl mb-8 overflow-hidden">
                            <img id="course-image" src="" alt="" class="w-full h-full object-cover hidden">
                            <div id="course-image-placeholder" class="w-full h-full bg-gray-200 flex items-center justify-center text-gray-400">تصویری یافت نشد</div>
                        </div>
                        <div class="prose prose-indigo max-w-none leading-relaxed text-gray-600" id="description"></div>
                        
                        <div class="mt-10 bg-amber-50 border border-amber-200 rounded-2xl p-6">
                            <h3 class="font-bold text-amber-800 text-lg">این دوره هنوز برای شما فعال نشده است</h3>
                            <p class="text-amber-700 mt-2 text-sm">برای دسترسی به تمام ویدئوها، جزوات و آزمون‌ها، لطفا دوره را خریداری کنید.</p>
                        </div>
                    </div>
                </div>

                <div id="content-view" class="hidden">
                    <div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-gray-100">
                        <h2 class="text-2xl font-bold mb-6 text-gray-900 border-b border-gray-100 pb-4">محتوای دوره</h2>
                        <div id="course-content" class="space-y-6"></div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4">
                <div class="bg-white rounded-3xl p-6 sticky top-8 shadow-sm border border-gray-100">
                    <div class="text-gray-400 text-sm mb-1">قیمت دوره:</div>
                    <div class="text-3xl font-black text-indigo-600 mb-2" id="price">۰ تومان</div>
                    
                    <button id="buy-btn" 
                            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-bold text-lg mt-6 transition shadow-md shadow-indigo-100">
                        خرید دوره
                    </button>

                    <div id="purchased-info" class="hidden mt-6 bg-green-50 border border-green-200 text-green-700 py-4 px-6 rounded-2xl text-center font-bold flex items-center justify-center gap-2">
                        <span>✅</span> شما این دوره را خریداری کرده‌اید
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const db = supabase.createClient(
            'https://qbsfotperzzhuimnpmto.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFic2ZvdHBlcnp6aHVpbW5wbXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MTM2NzIsImV4cCI6MjA5OTI4OTY3Mn0.N8Pv0hz3yKLcTVvwfiRlKW-yEE-d4vc1rkroZBglyTA'
        );

        const courseId = new URLSearchParams(window.location.search).get('id');

        async function loadCourseDetail() {
            if (!courseId) return;

            const formattedId = isNaN(courseId) ? courseId : Number(courseId);

            const { data: course, error: courseError } = await db
                .from('courses')
                .select('*')
                .eq('id', formattedId)
                .single();

            if (courseError || !course) {
                document.getElementById('description').innerHTML = '<p class="text-red-500 font-bold">دوره مورد نظر یافت نشد.</p>';
                return;
            }

            document.title = `${course.title} | آکادمی عزیزی`;
            document.getElementById('course-title').textContent = course.title;
            document.getElementById('price').textContent = course.price ? Number(course.price).toLocaleString('fa-IR') + ' تومان' : 'رایگان';
            
            const imgElement = document.getElementById('course-image');
            const placeholderElement = document.getElementById('course-image-placeholder');
            if (course.image_url) {
                imgElement.src = course.image_url;
                imgElement.alt = course.title;
                imgElement.classList.remove('hidden');
                placeholderElement.classList.add('hidden');
            }

            let isPurchased = false;
            try {
                const { data: userData } = await db.auth.getUser();
                const user = userData?.user;

                if (user) {
                    const { data: purchase } = await db
                        .from('user_purchases')
                        .select('*')
                        .eq('user_id', user.id)
                        .eq('course_id', formattedId)
                        .maybeSingle();

                    isPurchased = !!purchase;
                }
            } catch (authError) {
                console.error(authError);
            }

            if (isPurchased) {
                document.getElementById('purchase-view').classList.add('hidden');
                document.getElementById('content-view').classList.remove('hidden');
                document.getElementById('buy-btn').classList.add('hidden');
                document.getElementById('purchased-info').classList.remove('hidden');
                loadCourseContent(course);
            } else {
                document.getElementById('purchase-view').classList.remove('hidden');
                document.getElementById('description').innerHTML = `<p class="whitespace-pre-line">${course.description || 'توضیحات این دوره به زودی اضافه خواهد شد.'}</p>`;
            }
        }

        function loadCourseContent(course) {
            document.getElementById('course-content').innerHTML = `
                <div class="bg-green-50 border border-green-200 text-green-800 p-4 rounded-xl mb-6 font-medium">
                    محتوای کامل دوره برای شما فعال است.
                </div>
                <p class="text-gray-600 text-sm">دانش‌آموز گرامی، سرفصل‌ها و ویدیوهای آموزشی در این بخش برای شما در دسترس است.</p>
            `;
        }

        document.addEventListener('DOMContentLoaded', loadCourseDetail);
    </script>
</body>
</html>
