<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تکمیل / ویرایش مشخصات دانش‌آموز | آکادمی عزیزی</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Vazir', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md mx-4 border border-gray-100">
        <div class="text-center mb-6">
            <h1 id="page-heading" class="text-2xl font-bold text-gray-900">تکمیل پروفایل تحصیلی</h1>
            <p class="text-gray-500 mt-2 text-sm">لطفاً اطلاعات خود را دقیق وارد کنید</p>
        </div>

        <form id="profile-form" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">نام</label>
                <input type="text" id="first-name" required placeholder="مثال: علی"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">نام خانوادگی</label>
                <input type="text" id="last-name" required placeholder="مثال: محمدی"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">پایه تحصیلی</label>
                <select id="grade" required
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="" disabled selected>انتخاب کنید...</option>
                    <option value="9">نهم</option>
                    <option value="10">دهم</option>
                    <option value="11">یازدهم</option>
                    <option value="12">دوازدهم</option>
                </select>
            </div>

            <div id="major-wrapper" class="hidden">
                <label class="block text-sm font-semibold text-gray-700 mb-2">رشته تحصیلی</label>
                <select id="major"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="" disabled selected>انتخاب کنید...</option>
                    <option value="ریاضی">ریاضی فیزیک</option>
                    <option value="تجربی">علوم تجربی</option>
                    <option value="انسانی">علوم انسانی</option>
                </select>
            </div>

            <button type="submit" id="save-btn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-2xl transition text-lg shadow-sm">
                ثبت و ورود به داشبورد
            </button>
        </form>
    </div>

    <script>
        const supabaseClient = supabase.createClient(
            'https://qbsfotperzzhuimnpmto.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFic2ZvdHBlcnp6aHVpbW5wbXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MTM2NzIsImV4cCI6MjA5OTI4OTY3Mn0.N8Pv0hz3yKLcTVvwfiRlKW-yEE-d4vc1rkroZBglyTA'
        );

        let targetUserId = null;

        const form = document.getElementById('profile-form');
        const gradeSelect = document.getElementById('grade');
        const majorSelect = document.getElementById('major');
        const majorWrapper = document.getElementById('major-wrapper');
        const saveBtn = document.getElementById('save-btn');
        const pageHeading = document.getElementById('page-heading');

        gradeSelect.addEventListener('change', () => {
            if (gradeSelect.value === '9') {
                majorWrapper.classList.add('hidden');
                majorSelect.required = false;
            } else if (gradeSelect.value) {
                majorWrapper.classList.remove('hidden');
                majorSelect.required = true;
            } else {
                majorWrapper.classList.add('hidden');
                majorSelect.required = false;
            }
        });

        async function fetchExistingData() {
            const sessionToken = localStorage.getItem('session_token');
            if (!sessionToken) {
                window.location.href = 'login.html';
                return;
            }
            const { data: sessionData, error: sessionError } = await supabaseClient
                .from('user_sessions')
                .select('user_id, expires_at')
                .eq('token', sessionToken)
                .maybeSingle();
            if (sessionError || !sessionData || new Date(sessionData.expires_at) < new Date()) {
                localStorage.clear();
                window.location.href = 'login.html';
                return;
            }
            targetUserId = sessionData.user_id;

            const { data: userRow, error: userError } = await supabaseClient
                .from('site_users')
                .select('*')
                .eq('id', targetUserId)
                .maybeSingle();

            if (userError || !userRow) {
                return;
            }

            if (userRow.first_name || userRow.last_name) {
                pageHeading.textContent = 'ویرایش پروفایل تحصیلی';
                saveBtn.textContent = 'بروزرسانی اطلاعات';
            }

            if (userRow.first_name) document.getElementById('first-name').value = userRow.first_name;
            if (userRow.last_name) document.getElementById('last-name').value = userRow.last_name;
            
            if (userRow.grade) {
                gradeSelect.value = userRow.grade;
                gradeSelect.dispatchEvent(new Event('change'));
                
                if (userRow.grade !== '9' && userRow.major) {
                    majorSelect.value = userRow.major;
                }
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!targetUserId) {
                alert('خطا در احراز هویت کاربری.');
                return;
            }

            saveBtn.disabled = true;
            saveBtn.textContent = 'در حال ذخیره‌سازی...';

            const firstName = document.getElementById('first-name').value.trim();
            const lastName = document.getElementById('last-name').value.trim();
            const grade = gradeSelect.value;
            const major = grade === '9' ? 'سایر' : majorSelect.value;

            const { error: updateError } = await supabaseClient
                .from('site_users')
                .update({
                    first_name: firstName,
                    last_name: lastName,
                    grade: grade,
                    major: major
                })
                .eq('id', targetUserId);

            if (updateError) {
                console.error(updateError);
                alert('خطایی در ثبت اطلاعات رخ داد: ' + updateError.message);
                saveBtn.disabled = false;
                saveBtn.textContent = 'ثبت و ورود به داشبورد';
            } else {
                alert('اطلاعات با موفقیت ذخیره شد!');
                window.location.href = 'dashboard.html';
            }
        });

        document.addEventListener('DOMContentLoaded', fetchExistingData);
    </script>
</body>
</html>
