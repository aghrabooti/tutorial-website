<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تکمیل / ویرایش مشخصات دانش‌آموز | آکادمی عزیزی</title>


<link 
href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
rel="stylesheet">


<link 
href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css"
rel="stylesheet">


<style>

body{
    font-family: Vazir,sans-serif;
}

</style>


</head>


<body class="bg-gray-50 flex items-center justify-center min-h-screen">



<div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md mx-4 border border-gray-100">


<div class="text-center mb-6">

<h1 
id="page-heading"
class="text-2xl font-bold text-gray-900">

تکمیل پروفایل تحصیلی

</h1>


<p class="text-gray-500 mt-2 text-sm">
لطفاً اطلاعات خود را دقیق وارد کنید
</p>


</div>





<form 
id="profile-form"
class="space-y-5">





<div>

<label class="block text-sm font-semibold text-gray-700 mb-2">
نام
</label>


<input
id="first-name"
type="text"
required
placeholder="مثال: علی"
class="w-full px-4 py-3 bg-gray-50 border rounded-2xl">


</div>






<div>

<label class="block text-sm font-semibold text-gray-700 mb-2">
نام خانوادگی
</label>


<input
id="last-name"
type="text"
required
placeholder="مثال: محمدی"
class="w-full px-4 py-3 bg-gray-50 border rounded-2xl">


</div>






<div>

<label class="block text-sm font-semibold text-gray-700 mb-2">
پایه تحصیلی
</label>


<select
id="grade"
required
class="w-full px-4 py-3 bg-gray-50 border rounded-2xl">


<option value="" disabled selected>
انتخاب کنید...
</option>

<option value="9">
نهم
</option>

<option value="10">
دهم
</option>

<option value="11">
یازدهم
</option>

<option value="12">
دوازدهم
</option>


</select>


</div>






<div id="major-wrapper">
    <label class="block text-sm font-semibold text-gray-700 mb-2">
        رشته تحصیلی
    </label>

    <select id="major"
        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500">

        <option value="" disabled selected>
            انتخاب کنید...
        </option>

        <option value="ریاضی">
            ریاضی فیزیک
        </option>

        <option value="تجربی">
            علوم تجربی
        </option>

        <option value="انسانی">
            علوم انسانی
        </option>

    </select>
</div>






<button
id="save-btn"
class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold">


ثبت و ورود به داشبورد


</button>



</form>


</div>





<script src="../js/api.js"></script>


<script>


let currentUser=null;



const form =
document.getElementById("profile-form");


const gradeSelect =
document.getElementById("grade");


const majorSelect =
document.getElementById("major");


const majorWrapper =
document.getElementById("major-wrapper");


const saveBtn =
document.getElementById("save-btn");


const pageHeading =
document.getElementById("page-heading");







gradeSelect.addEventListener("change", () => {

    if (gradeSelect.value === "9") {

        majorSelect.disabled = true;
        majorSelect.value = "";
        majorSelect.required = false;

    } else {

        majorSelect.disabled = false;
        majorSelect.required = true;

    }

    majorSelect.classList.toggle(
    "opacity-50",
    majorSelect.disabled
);

});







async function fetchExistingData() {
    const token = localStorage.getItem("session_token");
    if (!token) {
        window.location.href = "login.html";
        return;
    }


    if (!result.valid) {
        localStorage.clear();
        window.location.href = "login.html";
        return;
    }

    currentUser = result.user;

    document.getElementById("first-name").value = currentUser.first_name || "";
    document.getElementById("last-name").value = currentUser.last_name || "";

    if (currentUser.grade) {
        gradeSelect.value = currentUser.grade;
        
        gradeSelect.dispatchEvent(new Event("change"));

        if (currentUser.grade !== "9" && currentUser.major) {
            majorSelect.value = currentUser.major;
        }
    }
}



form.addEventListener(
"submit",
async(e)=>{


e.preventDefault();



saveBtn.disabled=true;

saveBtn.textContent=
"در حال ذخیره...";





const payload={



token:
localStorage.getItem(
"session_token"
),



first_name:
document.getElementById(
"first-name"
).value.trim(),




last_name:
document.getElementById(
"last-name"
).value.trim(),




grade:
gradeSelect.value,




major:
gradeSelect.value==="9"
?
"null"
:
majorSelect.value



};








const result =
await apiCall(
"update-profile",
payload
);






console.log(result);







if(result.success){


alert(
"اطلاعات با موفقیت ذخیره شد"
);


window.location.href=
"dashboard.html";


}
else{


alert(
result.error ||
"خطا در ذخیره اطلاعات"
);


saveBtn.disabled=false;


saveBtn.textContent=
"ثبت و ورود به داشبورد";


}



});







document.addEventListener(
"DOMContentLoaded",
fetchExistingData
);



</script>


</body>

</html>
