<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تکمیل مشخصات دانش‌آموز | آکادمی عزیزی</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Vazir', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md mx-4 border border-gray-100">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-900">تکمیل پروفایل تحصیلی</h1>
            <p class="text-gray-500 mt-2 text-sm">لطفاً اطلاعات خود را دقیق وارد کنید</p>
        </div>

        <form id="profile-form" class="space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">نام</label>
                    <input type="text" id="first-name" required placeholder="مثال: محمد"
                        class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">نام خانوادگی</label>
                    <input type="text" id="last-name" required placeholder="مثال: امینی"
                        class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">پایه تحصیلی</label>
                <select id="grade-select" required class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="">انتخاب پایه...</option>
                    <option value="9">نهم</option>
                    <option value="10">دهم</option>
                    <option value="11">یازدهم</option>
                    <option value="12">دوازدهم</option>
                </select>
            </div>

            <div id="major-wrapper">
                <label class="block text-sm font-semibold text-gray-700 mb-2">رشته تحصیلی</label>
                <select id="major-select" required class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="">انتخاب رشته...</option>
                    <option value="ریاضی">ریاضی فیزیک</option>
                    <option value="تجربی">علوم تجربی</option>
                    <option value="انسانی">علوم انسانی</option>
                </select>
            </div>

            <button type="submit" id="save-btn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-2xl transition text-lg shadow-sm">
                ثبت و ورود به داشبورد
            </button>
        </form>
    </div>

    <script>
        const supabaseClient = supabase.createClient(
            'https://qbsfotperzzhuimnpmto.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFic2ZvdHBlcnp6aHVpbW5wbXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MTM2NzIsImV4cCI6MjA5OTI4OTY3Mn0.N8Pv0hz3yKLcTVvwfiRlKW-yEE-d4vc1rkroZBglyTA'
        );

        const gradeSelect = document.getElementById('grade-select');
        const majorWrapper = document.getElementById('major-wrapper');
        const majorSelect = document.getElementById('major-select');
        const form = document.getElementById('profile-form');
        const saveBtn = document.getElementById('save-btn');

        gradeSelect.addEventListener('change', () => {
            const selectedGrade = gradeSelect.value;
            if (selectedGrade === '9') {
                majorWrapper.style.opacity = '0.5';
                majorSelect.disabled = true;
                majorSelect.required = false;
                majorSelect.value = '';
            } else {
                majorWrapper.style.opacity = '1';
                majorSelect.disabled = false;
                majorSelect.required = true;
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            saveBtn.disabled = true;
            saveBtn.textContent = 'در حال ثبت اطلاعات...';

            const { data: { user }, error: userError } = await supabaseClient.auth.getUser();

            if (userError || !user) {
                alert('نشست شما منقضی شده است. لطفا دوباره لاگین کنید.');
                window.location.href = 'login.html';
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const phoneParam = urlParams.get('phone') || '';

            const firstName = document.getElementById('first-name').value.trim();
            const lastName = document.getElementById('last-name').value.trim();
            const grade = gradeSelect.value;
            const major = majorSelect.value;

            const { error: insertError } = await supabaseClient
                .from('students')
                .insert([{
                    id: user.id,
                    first_name: firstName,
                    last_name: lastName,
                    phone: phoneParam,
                    grade: grade,
                    major: major,
                    purchased_products: '',
                    total_spent: 0,
                    status: 'active'
                }]);

            if (insertError) {
                console.error(insertError);
                alert('خطایی در ثبت اطلاعات رخ داد: ' + insertError.message);
                saveBtn.disabled = false;
                saveBtn.textContent = 'ثبت و ورود به داشبورد';
            } else {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
