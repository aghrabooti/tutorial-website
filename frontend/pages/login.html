<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود / ثبت‌نام | آکادمی استاد مهدی عزیزی</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Vazir', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md mx-4 border border-gray-100">
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="text-white font-black text-3xl">م‌ع</span>
            </div>
            <h1 id="form-title" class="text-2xl font-bold text-gray-900">ورود به حساب کاربری</h1>
            <p id="form-desc" class="text-gray-500 mt-2 text-sm">شماره موبایل و رمز عبور خود را وارد کنید</p>
        </div>

        <form id="main-form" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">شماره موبایل</label>
                <input type="tel" id="phone" placeholder="09123456789" maxlength="11" required
                    class="w-full px-5 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div id="password-wrapper">
                <label class="block text-sm font-semibold text-gray-700 mb-2">رمز عبور</label>
                <input type="password" id="password" placeholder="••••••••"
                    class="w-full px-5 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div id="otp-wrapper" class="hidden">
                <label class="block text-sm font-semibold text-gray-700 mb-2">کد تایید پیامک شده</label>
                <input type="text" id="otp" maxlength="6" placeholder="123456"
                    class="w-full px-5 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl text-center text-xl tracking-widest focus:outline-none focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div id="new-password-wrapper" class="hidden">
                <label class="block text-sm font-semibold text-gray-700 mb-2">رمز عبور جدید</label>
                <input type="password" id="new-password" placeholder="رمز عبور جدید خود را وارد کنید"
                    class="w-full px-5 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div id="login-links" class="flex justify-between items-center text-sm px-1">
                <button type="button" id="go-forgot-btn" class="text-gray-400 hover:text-indigo-600 transition">فراموشی رمز عبور</button>
                <button type="button" id="go-signup-btn" class="text-indigo-600 font-bold hover:underline">ثبت‌نام دانش‌آموز جدید</button>
            </div>

            <div id="back-to-login-wrapper" class="hidden text-center text-sm">
                <button type="button" id="go-login-btn" class="text-indigo-600 font-bold hover:underline">بازگشت به صفحه ورود</button>
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-2xl transition text-lg shadow-sm">
                ورود
            </button>
        </form>
    </div>

    <script>
        const supabaseClient = supabase.createClient(
            'https://qbsfotperzzhuimnpmto.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFic2ZvdHBlcnp6aHVpbW5wbXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MTM2NzIsImV4cCI6MjA5OTI4OTY3Mn0.N8Pv0hz3yKLcTVvwfiRlKW-yEE-d4vc1rkroZBglyTA'
        );

        const form = document.getElementById('main-form');
        const formTitle = document.getElementById('form-title');
        const formDesc = document.getElementById('form-desc');
        
        const phoneInput = document.getElementById('phone');
        const passwordInput = document.getElementById('password');
        const otpInput = document.getElementById('otp');
        const newPasswordInput = document.getElementById('new-password');
        
        const passwordWrapper = document.getElementById('password-wrapper');
        const otpWrapper = document.getElementById('otp-wrapper');
        const newPasswordWrapper = document.getElementById('new-password-wrapper');
        const loginLinks = document.getElementById('login-links');
        const backToLoginWrapper = document.getElementById('back-to-login-wrapper');
        
        const submitBtn = document.getElementById('submit-btn');
        
        const goForgotBtn = document.getElementById('go-forgot-btn');
        const goSignupBtn = document.getElementById('go-signup-btn');
        const goLoginBtn = document.getElementById('go-login-btn');

        let currentMode = 'login';
        let step = 1;

        function switchMode(mode) {
            currentMode = mode;
            step = 1;
            
            phoneInput.disabled = false;
            phoneInput.value = '';
            passwordInput.value = '';
            otpInput.value = '';
            newPasswordInput.value = '';

            otpWrapper.classList.add('hidden');
            newPasswordWrapper.classList.add('hidden');

            if (mode === 'login') {
                formTitle.textContent = 'ورود به حساب کاربری';
                formDesc.textContent = 'شماره موبایل و رمز عبور خود را وارد کنید';
                passwordWrapper.classList.remove('hidden');
                passwordInput.required = true;
                loginLinks.classList.remove('hidden');
                backToLoginWrapper.classList.add('hidden');
                submitBtn.textContent = 'ورود';
            } else if (mode === 'signup') {
                formTitle.textContent = 'ثبت‌نام دانش‌آموز جدید';
                formDesc.textContent = 'برای شروع شماره موبایل خود را وارد کنید';
                passwordWrapper.classList.add('hidden');
                passwordInput.required = false;
                loginLinks.classList.add('hidden');
                backToLoginWrapper.classList.remove('hidden');
                submitBtn.textContent = 'ارسال کد تایید پیامکی';
            } else if (mode === 'forgot') {
                formTitle.textContent = 'بازیابی رمز عبور';
                formDesc.textContent = 'شماره موبایل خود را جهت دریافت کد تایید وارد کنید';
                passwordWrapper.classList.add('hidden');
                passwordInput.required = false;
                loginLinks.classList.add('hidden');
                backToLoginWrapper.classList.remove('hidden');
                submitBtn.textContent = 'ارسال کد بازیابی';
            }
        }

        goSignupBtn.addEventListener('click', () => switchMode('signup'));
        goForgotBtn.addEventListener('click', () => switchMode('forgot'));
        goLoginBtn.addEventListener('click', () => switchMode('login'));

        async function triggerSmsir(phone, code) {
            try {
                const response = await fetch('https://api.sms.ir/v1/send/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-KEY': 'YOUR_SMS_IR_API_KEY_HERE'
                    },
                    body: JSON.stringify({
                        mobile: phone,
                        templateId: 100000, 
                        parameters: [{ name: "code", value: code }]
                    })
                });
                const result = await response.json();
                return result.status === 1;
            } catch (err) {
                return false;
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = phoneInput.value.trim();

            if (!phone || phone.length < 11 || !phone.startsWith('09')) {
                alert('لطفاً شماره موبایل را به درستی وارد کنید.');
                return;
            }

            if (currentMode === 'login') {
                submitBtn.disabled = true;
                submitBtn.textContent = 'در حال بررسی...';

                const formattedPhone = '+98' + phone.substring(1);
                const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
                    phone: formattedPhone,
                    password: passwordInput.value
                });

                if (authError) {
                    alert('شماره موبایل یا رمز عبور اشتباه است.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'ورود';
                    return;
                }

                const { data: studentProfile, error: dbError } = await supabaseClient
                    .from('students')
                    .select('*')
                    .eq('phone', phone)
                    .single();

                if (dbError && dbError.code !== 'PGRST116') {
                    alert('خطا در اتصال به شبکه.');
                    submitBtn.disabled = false;
                    return;
                }

                if (!studentProfile) {
                    window.location.href = `complete-profile.html?phone=${phone}`;
                } else {
                    window.location.href = 'dashboard.html';
                }

            } else if (currentMode === 'signup') {
                if (step === 1) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'در حال ارسال پیامک...';

                    const { data: existingUser } = await supabaseClient
                        .from('students')
                        .select('id')
                        .eq('phone', phone)
                        .single();

                    if (existingUser) {
                        alert('این شماره موبایل قبلاً ثبت‌نام کرده است. لطفا وارد شوید.');
                        switchMode('login');
                        submitBtn.disabled = false;
                        return;
                    }

                    const randomOtp = Math.floor(100000 + Math.random() * 900000).toString();
                    await supabaseClient.from('otp_codes').upsert([{ phone: phone, code: randomOtp }]);

                    const smsSuccess = await triggerSmsir(phone, randomOtp);
                    if (smsSuccess) {
                        phoneInput.disabled = true;
                        otpWrapper.classList.remove('hidden');
                        submitBtn.textContent = 'تایید کد و ساخت حساب';
                        step = 2;
                    } else {
                        alert('خطا در ارسال پیامک. مجدداً تلاش کنید.');
                    }
                    submitBtn.disabled = false;

                } else if (step === 2) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'در حال بررسی کد...';

                    const { data: otpData } = await supabaseClient
                        .from('otp_codes')
                        .select('*')
                        .eq('phone', phone)
                        .eq('code', otpInput.value.trim())
                        .single();

                    if (!otpData) {
                        alert('کد تایید اشتباه یا منقضی شده است.');
                        submitBtn.disabled = false;
                        return;
                    }

                    await supabaseClient.from('otp_codes').delete().eq('phone', phone);
                    
                    phoneInput.disabled = false;
                    otpWrapper.classList.add('hidden');
                    newPasswordWrapper.classList.remove('hidden');
                    formTitle.textContent = 'تعیین رمز عبور';
                    formDesc.textContent = 'یک رمز عبور برای حساب خود انتخاب کنید';
                    submitBtn.textContent = 'تکمیل نهایی ثبت‌نام';
                    step = 3;
                    submitBtn.disabled = false;

                } else if (step === 3) {
                    const pass = newPasswordInput.value.trim();
                    if (pass.length < 6) {
                        alert('رمز عبور باید حداقل ۶ کاراکتر باشد.');
                        return;
                    }

                    submitBtn.disabled = true;
                    submitBtn.textContent = 'در حال ایجاد حساب...';

                    const formattedPhone = '+98' + phone.substring(1);
                    const { data: authData, error: signUpError } = await supabaseClient.auth.signUp({
                        phone: formattedPhone,
                        password: pass
                    });

                    if (signUpError) {
                        alert('خطا در ساخت حساب: ' + signUpError.message);
                        submitBtn.disabled = false;
                        return;
                    }

                    window.location.href = `complete-profile.html?phone=${phone}`;
                }

            } else if (currentMode === 'forgot') {
                if (step === 1) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'در حال ارسال کد بازیابی...';

                    const { data: existingUser } = await supabaseClient
                        .from('students')
                        .select('id')
                        .eq('phone', phone)
                        .single();

                    if (!existingUser) {
                        alert('حسابی با این شماره موبایل یافت نشد.');
                        submitBtn.disabled = false;
                        return;
                    }

                    const randomOtp = Math.floor(100000 + Math.random() * 900000).toString();
                    await supabaseClient.from('otp_codes').upsert([{ phone: phone, code: randomOtp }]);

                    const smsSuccess = await triggerSmsir(phone, randomOtp);
                    if (smsSuccess) {
                        phoneInput.disabled = true;
                        otpWrapper.classList.remove('hidden');
                        submitBtn.textContent = 'تایید کد بازیابی';
                        step = 2;
                    } else {
                        alert('خطا در ارسال پیامک.');
                    }
                    submitBtn.disabled = false;

                } else if (step === 2) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'در حال بررسی...';

                    const { data: otpData } = await supabaseClient
                        .from('otp_codes')
                        .select('*')
                        .eq('phone', phone)
                        .eq('code', otpInput.value.trim())
                        .single();

                    if (!otpData) {
                        alert('کد تایید اشتباه است.');
                        submitBtn.disabled = false;
                        return;
                    }

                    await supabaseClient.from('otp_codes').delete().eq('phone', phone);

                    otpWrapper.classList.add('hidden');
                    newPasswordWrapper.classList.remove('hidden');
                    formTitle.textContent = 'تغییر رمز عبور';
                    formDesc.textContent = 'رمز عبور جدید خود را وارد کنید';
                    submitBtn.textContent = 'ثبت رمز عبور جدید';
                    step = 3;
                    submitBtn.disabled = false;

                } else if (step === 3) {
                    const pass = newPasswordInput.value.trim();
                    if (pass.length < 6) {
                        alert('رمز عبور باید حداقل ۶ کاراکتر باشد.');
                        return;
                    }

                    submitBtn.disabled = true;
                    submitBtn.textContent = 'در حال بروزرسانی...';

                    const { error: updateError } = await supabaseClient.auth.updateUser({
                        password: pass
                    });

                    if (updateError) {
                        alert('خطا در تغییر رمز عبور. مجدداً لاگین و تلاش کنید.');
                    } else {
                        alert('رمز عبور شما با موفقیت تغییر کرد. اکنون وارد شوید.');
                        switchMode('login');
                    }
                    submitBtn.disabled = false;
                }
            }
        });
    </script>
</body>
</html>
