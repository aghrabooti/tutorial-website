<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود / ثبت‌نام | آکادمی استاد مهدی عزیزی</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md mx-4 border border-gray-100">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                <span class="text-white font-black text-2xl">م‌ع</span>
            </div>
            <h1 class="text-xl font-bold text-gray-800">ورود یا ثبت‌نام</h1>
            <p class="text-gray-400 text-xs mt-2">برای دسترسی به پکیج‌ها، شماره موبایل خود را وارد کنید</p>
        </div>

        <form id="login-form" onsubmit="event.preventDefault();" class="space-y-6">
            
            <div id="phone-step">
                <label for="phone" class="block text-sm font-semibold text-gray-700 mb-2">شماره موبایل</label>
                <div class="relative">
                    <input type="tel" id="phone" name="phone" placeholder="09123456789" required
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-left tracking-widest text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition font-sans">
                </div>
                <p class="text-[11px] text-gray-400 mt-1.5 right-0 text-right">کد تایید پیامکی به این شماره ارسال خواهد شد.</p>
            </div>

            <div id="otp-step" class="hidden space-y-4">
                <div class="flex justify-between items-center mb-1">
                    <label for="otp" class="block text-sm font-semibold text-gray-700">کد تایید پیامک شده</label>
                    <button type="button" id="edit-phone-btn" class="text-xs text-blue-600 hover:underline cursor-pointer">ویرایش شماره</button>
                </div>
                <input type="text" id="otp" placeholder="12345" maxlength="5"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-center tracking-[1em] text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition font-sans">
                <p class="text-[11px] text-gray-400 text-right" id="timer-text">ارسال مجدد کد پس از <span id="countdown">59</span> ثانیه</p>
            </div>

            <div id="register-step" class="hidden space-y-4">
                <h3 class="text-sm font-bold text-gray-700 border-b border-gray-100 pb-2 mb-2">تکمیل اطلاعات ثبت‌نام</h3>
                
                <div>
                    <label for="fullname" class="block text-xs font-semibold text-gray-600 mb-1">نام و نام خانوادگی</label>
                    <input type="text" id="fullname" placeholder="مثلا: علی محمدی"
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 transition text-sm">
                </div>

                <div>
                    <label for="grade" class="block text-xs font-semibold text-gray-600 mb-1">پایه درسی</label>
                    <select id="grade" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 transition text-sm">
                        <option value="">انتخاب کنید...</option>
                        <option value="10">دهم</option>
                        <option value="11">یازدهم</option>
                        <option value="12">دوازدهم (کنکور)</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-blue-100 transition duration-200 cursor-pointer text-center">
                ارسال کد تایید
            </button>
        </form>
    </div>

</body>
</html>
