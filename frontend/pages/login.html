م‌ع

<h1 class="text-2xl font-bold text-gray-900">
خوش آمدید

وارد حساب کاربری خود شوید
</p>


</div>





<div class="space-y-5">


<div>

<label class="block text-sm font-bold text-gray-700 mb-2">
شماره موبایل
</label>


<input
id="phone"
type="tel"
dir="ltr"
placeholder="09123456789"
class="
w-full
px-4
py-3
bg-gray-50
border
border-gray-200
rounded-2xl
text-center
font-bold
tracking-widest
focus:outline-none
focus:ring-2
focus:ring-indigo-500
">

</div>





<div>

<label class="block text-sm font-bold text-gray-700 mb-2">
رمز عبور
</label>


<input
id="password"
type="password"
dir="ltr"
placeholder="******"
class="
w-full
px-4
py-3
bg-gray-50
border
border-gray-200
rounded-2xl
text-center
font-bold
focus:outline-none
focus:ring-2
focus:ring-indigo-500
">

</div>





<button
id="login-btn"
class="
w-full
bg-indigo-600
hover:bg-indigo-700
text-white
font-bold
py-3.5
rounded-2xl
transition
shadow-sm
">

ورود

</button>

<div class="flex justify-between items-center mt-4">

<button
id="register-btn"
type="button"
class="text-indigo-600 font-bold text-sm hover:text-indigo-700 transition">
ثبت نام
</button>

<button
id="forgot-btn"
type="button"
class="text-gray-500 text-sm hover:text-gray-700 transition">
فراموشی رمز عبور
</button>

</div>


</div>





<p 
id="message"
class="text-center text-sm mt-5 text-gray-500">
</p>



</div>


<script src="../js/login.js"></script>
<script src="../js/api.js"></script>
