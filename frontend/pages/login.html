<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود / ثبت‌نام | آکادمی استاد مهدی عزیزی</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Vazir', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md mx-4 border border-gray-100">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="text-white font-black text-3xl">م‌ع</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">ورود یا ثبت‌نام</h1>
            <p class="text-gray-500 mt-2 text-sm">برای ادامه، شماره موبایل خود را وارد کنید</p>
        </div>

        <form id="auth-form" class="space-y-6">
            <div id="phone-step">
                <label class="block text-sm font-semibold text-gray-700 mb-2">شماره موبایل</label>
                <input type="tel" id="phone" placeholder="09123456789" maxlength="11"
                    class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div id="otp-step" class="hidden">
                <label class="block text-sm font-semibold text-gray-700 mb-2">کد تایید</label>
                <input type="text" id="otp" maxlength="6" placeholder="123456"
                    class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl text-center text-2xl tracking-widest focus:outline-none focus:ring-2 focus:ring-indigo-500 outline-none">
                <button type="button" id="resend-btn" class="text-indigo-600 text-sm mt-3 hover:underline">ارسال مجدد کد</button>
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-2xl transition text-lg">
                ارسال کد تایید
            </button>
        </form>

        <p class="text-center text-xs text-gray-400 mt-8">با ورود، شرایط و قوانین آکادمی را می‌پذیرید</p>
    </div>

    <script>
        const supabaseClient = supabase.createClient(
            'https://qbsfotperzzhuimnpmto.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFic2ZvdHBlcnp6aHVpbW5wbXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MTM2NzIsImV4cCI6MjA5OTI4OTY3Mn0.N8Pv0hz3yKLcTVvwfiRlKW-yEE-d4vc1rkroZBglyTA'
        );

        const form = document.getElementById('auth-form');
        const phoneStep = document.getElementById('phone-step');
        const otpStep = document.getElementById('otp-step');
        const submitBtn = document.getElementById('submit-btn');
        const resendBtn = document.getElementById('resend-btn');

        let phoneNumber = '';
        let isOtpStep = false;

        async function sendOtpCode() {
            phoneNumber = document.getElementById('phone').value.trim();
            if (!phoneNumber || phoneNumber.length < 11 || !phoneNumber.startsWith('09')) {
                alert('لطفاً شماره موبایل ۱۱ رقمی خود را که با ۰۹ آغاز می‌شود به درستی وارد کنید.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'در حال ارسال...';

            const formattedPhone = '+98' + phoneNumber.substring(1);

            const { error } = await supabaseClient.auth.signInWithOtp({
                phone: formattedPhone
            });

            if (error) {
                alert('خطا در ارسال کد: ' + error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'ارسال کد تایید';
            } else {
                phoneStep.classList.add('hidden');
                otpStep.classList.remove('hidden');
                submitBtn.textContent = 'تایید کد';
                isOtpStep = true;
                submitBtn.disabled = false;
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!isOtpStep) {
                await sendOtpCode();
            } else {
                const otp = document.getElementById('otp').value.trim();
                if (!otp || otp.length < 4) {
                    alert('لطفاً کد تایید را به درستی وارد کنید.');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = 'در حال بررسی...';

                const formattedPhone = '+98' + phoneNumber.substring(1);

                const { data: authData, error: authError } = await supabaseClient.auth.verifyOtp({
                    phone: formattedPhone,
                    token: otp,
                    type: 'sms'
                });

                if (authError) {
                    alert('کد وارد شده اشتباه است یا منقضی شده است.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'تایید کد';
                } else {
                    const user = authData.user;

                    const { data: studentProfile, error: dbError } = await supabaseClient
                        .from('students')
                        .select('*')
                        .eq('id', user.id)
                        .single();

                    if (dbError && dbError.code !== 'PGRST116') { 
                        alert('خطایی در اتصال به سیستم رخ داد. مجدداً تلاش کنید.');
                        submitBtn.disabled = false;
                        return;
                    }

                    if (!studentProfile) {
                        window.location.href = `complete-profile.html?phone=${phoneNumber}`;
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }
            }
        });

        resendBtn.addEventListener('click', async () => {
            await sendOtpCode();
        });
    </script>
</body>
</html>
