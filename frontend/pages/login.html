<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود / ثبت‌نام | آکادمی استاد مهدی عزیزی</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Vazir', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md mx-4 border border-gray-100">
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="text-white font-black text-3xl">م‌ع</span>
            </div>
            <h1 id="form-title" class="text-2xl font-bold text-gray-900">خوش آمدید</h1>
            <p id="form-desc" class="text-gray-500 mt-2 text-sm">لطفاً شماره موبایل و رمز عبور خود را وارد کنید</p>
        </div>

        <form id="auth-form" class="space-y-4">
            <div id="phone-wrapper">
                <label class="block text-sm font-semibold text-gray-700 mb-2">شماره موبایل</label>
                <input type="tel" id="phone" required placeholder="مثال: 09123456789" dir="ltr"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-center font-bold tracking-widest">
            </div>

            <div id="password-wrapper">
                <label class="block text-sm font-semibold text-gray-700 mb-2">رمز عبور</label>
                <input type="password" id="password" required placeholder="******" dir="ltr"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-center font-bold">
            </div>

            <div id="otp-wrapper" class="hidden">
                <label class="block text-sm font-semibold text-gray-700 mb-2">کد تایید پیامک شده</label>
                <input type="text" id="otp" placeholder="۱۲۳۴" dir="ltr" maxlength="4"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-center font-black text-xl tracking-widest">
            </div>

            <div id="new-password-wrapper" class="hidden">
                <label class="block text-sm font-semibold text-gray-700 mb-2">رمز عبور جدید</label>
                <input type="password" id="new-password" placeholder="حداقل ۶ کاراکتر" dir="ltr"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-center font-bold">
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 rounded-2xl transition shadow-sm">
                ورود به حساب
            </button>
        </form>

        <div class="mt-6 text-center text-sm" id="toggle-link-wrapper">
            <span id="toggle-text" class="text-gray-500">حساب کاربری ندارید؟</span>
            <button id="toggle-mode-btn" class="text-indigo-600 font-bold hover:underline mr-1 focus:outline-none">ثبت‌نام کنید</button>
        </div>

        <div class="mt-4 text-center text-sm" id="forgot-wrapper">
            <button id="forgot-password-btn" class="text-gray-400 font-medium hover:text-indigo-600 transition focus:outline-none">رمز عبور خود را فراموش کرده‌اید؟</button>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('YOUR_URL', 'YOUR_KEY');

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const rawPhone = phoneInput.value.trim();
            const dbPhone = '+98' + rawPhone.substring(1);
            const pass = passwordInput.value;

            submitBtn.disabled = true;
            
            try {
                if (currentMode === 'login') {
                    const { data, error } = await supabase.auth.signInWithPassword({
                        phone: dbPhone,
                        password: pass
                    });
                    if (error) throw error;
                    window.location.href = 'dashboard.html';
                } else if (currentMode === 'register') {
                    const { data, error } = await supabase.auth.signUp({
                        phone: dbPhone,
                        password: pass
                    });
                    if (error) throw error;
                    window.location.href = 'complete-profile.html';
                }
            } catch (err) {
                alert(err.message);
            } finally {
                submitBtn.disabled = false;
            }
        });

        forgotPasswordBtn.addEventListener('click', async () => {
            const rawPhone = phoneInput.value.trim();
            const dbPhone = '+98' + rawPhone.substring(1);
            const { error } = await supabase.auth.resetPasswordForEmail(dbPhone + '@temporary.local');
            alert('درخواست بازیابی ارسال شد');
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
