<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود / ثبت‌نام | آکادمی استاد مهدی عزیزی</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Vazir', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md mx-4 border border-gray-100">
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="text-white font-black text-3xl">م‌ع</span>
            </div>
            <h1 id="form-title" class="text-2xl font-bold text-gray-900">خوش آمدید</h1>
            <p id="form-desc" class="text-gray-500 mt-2 text-sm">لطفاً شماره موبایل و رمز عبور خود را وارد کنید</p>
        </div>

        <form id="auth-form" class="space-y-4">
            <div id="phone-wrapper">
                <label class="block text-sm font-semibold text-gray-700 mb-2">شماره موبایل</label>
                <input type="tel" id="phone" required placeholder="مثال: 09123456789" dir="ltr"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-center font-bold tracking-widest">
            </div>

            <div id="password-wrapper">
                <label class="block text-sm font-semibold text-gray-700 mb-2">رمز عبور</label>
                <input type="password" id="password" required placeholder="******" dir="ltr"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-center font-bold">
            </div>

            <div id="otp-wrapper" class="hidden">
                <label class="block text-sm font-semibold text-gray-700 mb-2">کد تایید پیامک شده</label>
                <input type="text" id="otp" placeholder="۱۲۳۴" dir="ltr" maxlength="4"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-center font-black text-xl tracking-widest">
            </div>

            <div id="new-password-wrapper" class="hidden">
                <label class="block text-sm font-semibold text-gray-700 mb-2">رمز عبور جدید</label>
                <input type="password" id="new-password" placeholder="حداقل ۶ کاراکتر" dir="ltr"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-center font-bold">
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 rounded-2xl transition shadow-sm">
                ورود به حساب
            </button>
        </form>

        <div class="mt-6 text-center text-sm" id="toggle-link-wrapper">
            <span id="toggle-text" class="text-gray-500">حساب کاربری ندارید؟</span>
            <button id="toggle-mode-btn" class="text-indigo-600 font-bold hover:underline mr-1 focus:outline-none">ثبت‌نام کنید</button>
        </div>

        <div class="mt-4 text-center text-sm" id="forgot-wrapper">
            <button id="forgot-password-btn" class="text-gray-400 font-medium hover:text-indigo-600 transition focus:outline-none">رمز عبور خود را فراموش کرده‌اید؟</button>
        </div>
    </div>

    <script>
        const db = supabase.createClient(
            'https://qbsfotperzzhuimnpmto.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFic2ZvdHBlcnp6aHVpbW5wbXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MTM2NzIsImV4cCI6MjA5OTI4OTY3Mn0.N8Pv0hz3yKLcTVvwfiRlKW-yEE-d4vc1rkroZBglyTA'
        );

        const USER_TABLE = 'site_users';
        const SESSION_TABLE = 'user_sessions';

        let currentMode = 'login';
        let step = 1;
        let dbUserForReset = null;

        const authForm = document.getElementById('auth-form');
        const phoneInput = document.getElementById('phone');
        const passwordInput = document.getElementById('password');
        const otpInput = document.getElementById('otp');
        const newPasswordInput = document.getElementById('new-password');
        
        const phoneWrapper = document.getElementById('phone-wrapper');
        const passwordWrapper = document.getElementById('password-wrapper');
        const otpWrapper = document.getElementById('otp-wrapper');
        const newPasswordWrapper = document.getElementById('new-password-wrapper');

        const formTitle = document.getElementById('form-title');
        const formDesc = document.getElementById('form-desc');
        const submitBtn = document.getElementById('submit-btn');
        const toggleModeBtn = document.getElementById('toggle-mode-btn');
        const toggleText = document.getElementById('toggle-text');
        const forgotPasswordBtn = document.getElementById('forgot-password-btn');
        const forgotWrapper = document.getElementById('forgot-wrapper');
        const toggleLinkWrapper = document.getElementById('toggle-link-wrapper');

        function generateToken() {
            const arr = new Uint8Array(24);
            window.crypto.getRandomValues(arr);
            return Array.from(arr, b => b.toString(16).padStart(2, '0')).join('');
        }

        function convertToDbFormat(phone) {
            let num = phone.trim();
            if (num.startsWith('0')) {
                num = num.substring(1);
            }
            return '+98' + num;
        }

        function switchMode(mode) {
            currentMode = mode;
            step = 1;
            dbUserForReset = null;

            phoneWrapper.classList.remove('hidden');
            passwordWrapper.classList.remove('hidden');
            otpWrapper.classList.add('hidden');
            newPasswordWrapper.classList.add('hidden');
            
            phoneInput.required = true;
            passwordInput.required = true;
            otpInput.required = false;
            newPasswordInput.required = false;
            
            forgotWrapper.classList.remove('hidden');
            toggleLinkWrapper.classList.remove('hidden');

            if (mode === 'login') {
                formTitle.textContent = 'خوش آمدید';
                formDesc.textContent = 'لطفاً شماره موبایل و رمز عبور خود را وارد کنید';
                submitBtn.textContent = 'ورود به حساب';
                toggleText.textContent = 'حساب کاربری ندارید؟';
                toggleModeBtn.textContent = 'ثبت‌نام کنید';
            } else if (mode === 'register') {
                formTitle.textContent = 'ثبت‌نام دانش‌آموز';
                formDesc.textContent = 'برای عضویت شماره موبایل و یک رمز عبور تعیین کنید';
                submitBtn.textContent = 'ایجاد حساب کاربری';
                toggleText.textContent = 'قبلاً ثبت‌نام کرده‌اید؟';
                toggleModeBtn.textContent = 'وارد شوید';
                forgotWrapper.classList.add('hidden');
            }
        }

        toggleModeBtn.addEventListener('click', () => {
            if (currentMode === 'login') {
                switchMode('register');
            } else {
                switchMode('login');
            }
        });

        forgotPasswordBtn.addEventListener('click', () => {
            currentMode = 'forgot';
            step = 1;
            
            formTitle.textContent = 'فراموشی رمز عبور';
            formDesc.textContent = 'شماره موبایل خود را جهت بازیابی وارد کنید';
            submitBtn.textContent = 'ارسال کد تایید';
            
            passwordWrapper.classList.add('hidden');
            passwordInput.required = false;
            forgotWrapper.classList.add('hidden');
            toggleLinkWrapper.classList.add('hidden');
        });

        async function createSession(userId) {
            const token = generateToken();
            const expiresAt = new Date();
            expiresAt.setDate(expiresAt.getDate() + 30);

            const { error } = await db
                .from(SESSION_TABLE)
                .insert({
                    user_id: userId,
                    token: token,
                    expires_at: expiresAt.toISOString()
                });

            if (error) {
                console.error(error);
                alert('خطا در ایجاد نشست امنیتی.');
                return;
            }

            localStorage.setItem('session_token', token);
            
            const { data: userRow } = await db
                .from(USER_TABLE)
                .select('first_name, last_name, grade')
                .eq('id', userId)
                .maybeSingle();

            if (userRow && userRow.first_name && userRow.last_name && userRow.grade) {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'complete-profile.html';
            }
        }

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const rawPhone = phoneInput.value.trim();
            if (!rawPhone) return;
            
            const dbPhone = convertToDbFormat(rawPhone);

            if (currentMode === 'login') {
                const pass = passwordInput.value;
                submitBtn.disabled = true;
                submitBtn.textContent = 'در حال بررسی...';

                console.log("مقدار خام ورودی فرم:", rawPhone);
                console.log("final value: ", dbPhone);

                const { data: userRow, error } = await db
                    .from(USER_TABLE)
                    .select('*')
                    .eq('phone', dbPhone)
                    .maybeSingle();

                if (error) {
                    alert('خطا در برقراری ارتباط با پایگاه داده.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'ورود به حساب';
                    return;
                }

                if (!userRow) {
                    alert('خطا: شماره موبایل در سیستم یافت نشد.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'ورود به حساب';
                    return;
                }

                if (userRow.password !== pass) {
                    alert('خطا: رمز عبور وارد شده صحیح نمی‌باشد.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'ورود به حساب';
                    return;
                }

                await createSession(userRow.id);

            } else if (currentMode === 'register') {
                const pass = passwordInput.value;
                if (pass.length < 6) {
                    alert('رمز عبور باید حداقل ۶ کاراکتر باشد.');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = 'در حال ثبت‌نام...';

                const { data: existUser } = await db
                    .from(USER_TABLE)
                    .select('id')
                    .eq('phone', dbPhone)
                    .maybeSingle();

                if (existUser) {
                    alert('این شماره موبایل قبلاً در سیستم ثبت شده است.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'ایجاد حساب کاربری';
                    return;
                }

                const { data: newUser, error: regError } = await db
                    .from(USER_TABLE)
                    .insert({
                        phone: dbPhone,
                        password: pass
                    })
                    .select()
                    .single();

                if (regError || !newUser) {
                    alert('خطا در ثبت‌نام مکرر. لطفا بعدا تلاش کنید.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'ایجاد حساب کاربری';
                    return;
                }

                await createSession(newUser.id);

            } else if (currentMode === 'forgot') {
                if (step === 1) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'در حال بررسی...';

                    const { data: userRow, error } = await db
                        .from(USER_TABLE)
                        .select('*')
                        .eq('phone', dbPhone)
                        .maybeSingle();

                    if (error || !userRow) {
                        alert('شماره موبایل مورد نظر در سیستم یافت نشد.');
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'ارسال کد تایید';
                        return;
                    }

                    dbUserForReset = userRow;
                    
                    alert('کد تایید آزمایشی شما "1234" است.');
                    
                    phoneWrapper.classList.add('hidden');
                    phoneInput.required = false;
                    otpWrapper.classList.remove('hidden');
                    otpInput.required = true;
                    
                    formTitle.textContent = 'تایید کد ارسالی';
                    formDesc.textContent = 'کد ۴ رقمی ارسال شده را وارد کنید';
                    submitBtn.textContent = 'بررسی کد تایید';
                    step = 2;
                    submitBtn.disabled = false;

                } else if (step === 2) {
                    const enteredOtp = otpInput.value.trim();
                    if (enteredOtp !== '1234') {
                        alert('کد تایید اشتباه است.');
                        return;
                    }

                    otpWrapper.classList.add('hidden');
                    otpInput.required = false;
                    newPasswordWrapper.classList.remove('hidden');
                    newPasswordInput.required = true;
                    
                    formTitle.textContent = 'تغییر رمز عبور';
                    formDesc.textContent = 'رمز عبور جدید خود را وارد کنید';
                    submitBtn.textContent = 'ثبت رمز عبور جدید';
                    step = 3;

                } else if (step === 3) {
                    const newPass = newPasswordInput.value.trim();
                    if (newPass.length < 6) {
                        alert('رمز عبور باید حداقل ۶ کاراکتر باشد.');
                        return;
                    }

                    submitBtn.disabled = true;
                    submitBtn.textContent = 'در حال بروزرسانی...';

                    const { error: updateError } = await db
                        .from(USER_TABLE)
                        .update({ password: newPass })
                        .eq('id', dbUserForReset.id);

                    if (updateError) {
                        alert('خطا در تغییر رمز عبور مجدد.');
                    } else {
                        alert('رمز عبور با موفقیت تغییر کرد.');
                        switchMode('login');
                    }
                    submitBtn.disabled = false;
                }
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('session_token');
            if (token) {
                const { data } = await db
                    .from(SESSION_TABLE)
                    .select('user_id, expires_at')
                    .eq('token', token)
                    .maybeSingle();

                if (data && new Date(data.expires_at) > new Date()) {
                    window.location.href = 'dashboard.html';
                } else {
                    localStorage.clear();
                }
            }
        });
    </script>
</body>
</html>
