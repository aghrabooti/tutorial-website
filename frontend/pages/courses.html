<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دسته بندی محصولات | آکادمی ریاضی مهدی عزیزی</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Vazir', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

        <div class="flex justify-between h-16 items-center">


            <div class="flex items-center space-x-8 space-x-reverse">


                <div class="flex-shrink-0">

                    <a href="../index.html"
                    class="text-xl font-black text-gray-950 tracking-tight">

                        آکادمی
                        <span class="text-indigo-600">
                            عزیزی
                        </span>

                    </a>

                </div>




                <nav class="hidden md:flex space-x-6 space-x-reverse">

                    <a href="../index.html"
                    class="text-sm font-bold text-gray-600 hover:text-indigo-600">

                        صفحه اصلی

                    </a>


                    <a href="courses.html"
                    class="text-sm font-medium text-indigo-600">

                        پکیج‌های آموزشی

                    </a>


                    <a href="#"
                    class="text-sm font-medium text-gray-600 hover:text-indigo-600">

                        درباره ما

                    </a>


                    <a href="#"
                    class="text-sm font-medium text-gray-600 hover:text-indigo-600">

                        تماس با ما

                    </a>


                </nav>


            </div>





            <div class="flex items-center gap-3">



                <a 
                id="auth-btn"
                href="login.html"
                class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-sm font-bold px-4 py-2 rounded-xl transition">

                    ورود / ثبت‌نام

                </a>





                <a 
                href="cart.html"
                class="hidden sm:flex w-10 h-10 rounded-xl bg-white border border-gray-200 items-center justify-center hover:bg-indigo-50">

                    🛒

                </a>






                <button
                id="menu-toggle-btn"
                class="md:hidden p-2 text-gray-600 hover:bg-gray-100 rounded-xl">


                    <svg 
                    class="w-6 h-6"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24">


                        <path 
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M4 6h16M4 12h16M4 18h16"/>


                    </svg>


                </button>


            </div>



        </div>


    </div>


</header>






<div 
id="mobile-menu"
class="hidden md:hidden bg-white border-b border-gray-100 shadow-sm">


    <div class="p-4 space-y-2">


        <a href="../index.html"
        class="block px-4 py-3 rounded-xl hover:bg-gray-50 font-bold">

            صفحه اصلی

        </a>



        <a href="courses.html"
        class="block px-4 py-3 rounded-xl hover:bg-gray-50">

            پکیج‌های آموزشی

        </a>



        <a href="dashboard.html"
        class="block px-4 py-3 rounded-xl hover:bg-gray-50">

            پنل کاربری

        </a>



        <a href="#"
        class="block px-4 py-3 rounded-xl hover:bg-gray-50">

            درباره ما

        </a>



        <a href="#"
        class="block px-4 py-3 rounded-xl hover:bg-gray-50">

            تماس با ما

        </a>


    </div>


</div>

    <main class="container mx-auto px-4 py-12 max-w-7xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-black text-gray-900">فروشگاه محصولات آموزشی</h1>
            <p class="text-gray-500 mt-2 text-sm md:text-base">دوره‌ها و بسته‌های آموزشی آکادمی ریاضی مهدی عزیزی</p>
        </div>

        <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm max-w-3xl mx-auto mb-12">
            <div class="flex flex-wrap justify-center gap-4 mb-6 border-b border-gray-100 pb-6" id="type-buttons-container">
                <button data-type="course" class="type-btn bg-indigo-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold shadow-sm transition-all">دوره‌های آموزشی</button>
                <button data-type="book" class="type-btn bg-gray-100 text-gray-600 hover:bg-gray-200 px-6 py-2.5 rounded-xl text-sm font-bold transition-all">کتاب‌ها</button>
                <button data-type="pamphlet" class="type-btn bg-gray-100 text-gray-600 hover:bg-gray-200 px-6 py-2.5 rounded-xl text-sm font-bold transition-all">جزوات</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="grade-filter" class="block text-sm font-bold text-gray-700 mb-2">پایه تحصیلی:</label>
                    <select id="grade-filter" class="block w-full rounded-xl border-gray-300 bg-white px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm font-medium text-gray-700 outline-none border">
                        <option value="all">همه پایه‌ها</option>
                        <option value="9">نهم</option>
                        <option value="10">دهم</option>
                        <option value="11">یازدهم</option>
                        <option value="12">دوازدهم</option>
                    </select>
                </div>

                <div id="field-filter-wrapper">
                    <label for="field-filter" class="block text-sm font-bold text-gray-700 mb-2">رشته تحصیلی:</label>
                    <select id="field-filter" class="block w-full rounded-xl border-gray-300 bg-white px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm font-medium text-gray-700 outline-none border">
                        <option value="all">همه رشته‌ها</option>
                        <option value="ریاضی">ریاضی فیزیک</option>
                        <option value="تجربی">علوم تجربی</option>
                        <option value="انسانی">علوم انسانی</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div id="products-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/courses.js"></script>
</body>
</html>
