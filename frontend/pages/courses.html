<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دسته بندی محصولات | آکادمی ریاضی مهدی عزیزی</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Vazir', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                
                <div class="flex items-center space-x-8 space-x-reverse">
                    <div class="flex-shrink-0">
                        <a href="#" class="text-xl font-black text-gray-950 tracking-tight">
                            آکادمی <span class="text-indigo-600">عزیزی</span>
                        </a>
                    </div>

                    <nav class="hidden md:flex space-x-6 space-x-reverse">
                        <a href="../index.html" class="text-sm font-bold text-gray-600 hover:text-indigo-600">صفحه اصلی</a>
                        <a href="#" class="text-sm font-medium text-indigo-600 transition">پکیج‌های آموزشی</a>
                        <a href="#" class="text-sm font-medium text-gray-600 hover:text-indigo-600 transition">درباره ما</a>
                        <a href="#" class="text-sm font-medium text-gray-600 hover:text-indigo-600 transition">تماس با ما</a>
                    </nav>
                </div>

                <div class="flex items-center gap-3">
                    <a id="auth-btn" href="login.html" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-sm font-bold px-5 py-2.5 rounded-xl transition duration-300">
                        ورود / ثبت‌نام
                    </a>
                    <a href="cart.html" aria-label="سبد خرید" title="سبد خرید" class="w-10 h-10 rounded-xl bg-white border border-gray-200 text-gray-700 hover:text-indigo-600 hover:border-indigo-200 hover:bg-indigo-50 flex items-center justify-center transition duration-300">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13 5.4 5M7 13l-2 4h13M9 21a1 1 0 1 0 0-2 1 1 0 0 0 0 2Zm8 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z"></path>
                        </svg>
                    </a>
                    
                    <button class="md:hidden mr-4 p-2 text-gray-600 hover:bg-gray-50 rounded-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>

            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12 max-w-7xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-black text-gray-900">فروشگاه محصولات آموزشی</h1>
            <p class="text-gray-500 mt-2 text-sm md:text-base">دوره‌ها و بسته‌های آموزشی آکادمی ریاضی مهدی عزیزی</p>
        </div>

        <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm max-w-3xl mx-auto mb-12">
            <div class="flex flex-wrap justify-center gap-4 mb-6 border-b border-gray-100 pb-6" id="type-buttons-container">
                <button data-type="course" class="type-btn bg-indigo-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold shadow-sm transition-all">دوره‌های آموزشی</button>
                <button data-type="book" class="type-btn bg-gray-100 text-gray-600 hover:bg-gray-200 px-6 py-2.5 rounded-xl text-sm font-bold transition-all">کتاب‌ها</button>
                <button data-type="pamphlet" class="type-btn bg-gray-100 text-gray-600 hover:bg-gray-200 px-6 py-2.5 rounded-xl text-sm font-bold transition-all">جزوات</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="grade-filter" class="block text-sm font-bold text-gray-700 mb-2">پایه تحصیلی:</label>
                    <select id="grade-filter" class="block w-full rounded-xl border-gray-300 bg-white px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm font-medium text-gray-700 outline-none border">
                        <option value="all">همه پایه‌ها</option>
                        <option value="9">نهم</option>
                        <option value="10">دهم</option>
                        <option value="11">یازدهم</option>
                        <option value="12">دوازدهم</option>
                    </select>
                </div>

                <div id="field-filter-wrapper">
                    <label for="field-filter" class="block text-sm font-bold text-gray-700 mb-2">رشته تحصیلی:</label>
                    <select id="field-filter" class="block w-full rounded-xl border-gray-300 bg-white px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm font-medium text-gray-700 outline-none border">
                        <option value="all">همه رشته‌ها</option>
                        <option value="ریاضی">ریاضی فیزیک</option>
                        <option value="تجربی">علوم تجربی</option>
                        <option value="انسانی">علوم انسانی</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div id="products-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        const supabaseClient = supabase.createClient(
            'https://qbsfotperzzhuimnpmto.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFic2ZvdHBlcnp6aHVpbW5wbXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MTM2NzIsImV4cCI6MjA5OTI4OTY3Mn0.N8Pv0hz3yKLcTVvwfiRlKW-yEE-d4vc1rkroZBglyTA'
        );

        let allCourses = [];
        let currentFilters = {
            productType: 'course',
            grade: 'all',
            major: 'all'
        };

        async function checkUserSession() {
            const sessionToken = localStorage.getItem('session_token');
            if (sessionToken) {
                const { data: sessionData } = await supabaseClient
                    .from('user_sessions')
                    .select('user_id, expires_at')
                    .eq('token', sessionToken)
                    .maybeSingle();

                if (sessionData && new Date(sessionData.expires_at) > new Date()) {
                    const authBtn = document.getElementById('auth-btn');
                    if (authBtn) {
                        authBtn.textContent = 'داشبورد من';
                        authBtn.href = 'dashboard.html';
                    }
                }
            }
        }

        async function loadCourses() {
            await checkUserSession();
            
            const container = document.getElementById('products-container');
            if (!container) return;

            container.innerHTML = '<p class="text-center py-20 text-gray-500 text-lg">در حال بارگذاری محصولات...</p>';

            const { data, error } = await supabaseClient
                .from('courses')
                .select('*');

            if (error) {
                console.error('Supabase Error:', error);
                container.innerHTML = '<p class="text-red-500 text-center py-20 text-lg font-bold">خطا در بارگذاری محصولات. لطفا اتصال خود را بررسی کنید.</p>';
                return;
            }

            allCourses = data || [];
            applyFilters();

            document.getElementById('grade-filter').addEventListener('change', (e) => {
                currentFilters.grade = e.target.value;
                
                const fieldWrapper = document.getElementById('field-filter-wrapper');
                const fieldSelect = document.getElementById('field-filter');

                if (currentFilters.grade === '9' || currentFilters.grade === '10') {
                    fieldWrapper.style.opacity = '0.5';
                    fieldSelect.disabled = true;
                    currentFilters.major = 'all';
                    fieldSelect.value = 'all';
                } else {
                    fieldWrapper.style.opacity = '1';
                    fieldSelect.disabled = false;
                }
                applyFilters();
            });

            document.getElementById('field-filter').addEventListener('change', (e) => {
                currentFilters.major = e.target.value;
                applyFilters();
            });

            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.type-btn').forEach(b => {
                        b.classList.remove('bg-indigo-600', 'text-white', 'shadow-sm');
                        b.classList.add('bg-gray-100', 'text-gray-600');
                    });
                    e.target.classList.remove('bg-gray-100', 'text-gray-600');
                    e.target.classList.add('bg-indigo-600', 'text-white', 'shadow-sm');
                    
                    currentFilters.productType = e.target.getAttribute('data-type');
                    applyFilters();
                });
            });
        }

        function applyFilters() {
            let filtered = allCourses;

            filtered = filtered.filter(c => {
                const itemProductType = c.product_type ? String(c.product_type).trim() : 'course';
                const itemGrade = c.grade ? String(c.grade).trim() : '';
                const itemMajor = c.major ? String(c.major).trim() : '';

                const typeMatch = currentFilters.productType === 'all' || itemProductType === currentFilters.productType;
                const gradeMatch = currentFilters.grade === 'all' || itemGrade === currentFilters.grade;
                
                let majorMatch = true;
                if (currentFilters.grade !== '9' && currentFilters.grade !== '10') {
                    majorMatch = currentFilters.major === 'all' || itemMajor === currentFilters.major;
                }

                return typeMatch && gradeMatch && majorMatch;
            });

            renderCourses(filtered);
        }

        function renderCourses(coursesList) {
            const container = document.getElementById('products-container');
            if (!container) return;

            if (coursesList.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-20 text-lg col-span-full">هیچ محصولی با مشخصات انتخاب شده یافت نشد.</p>';
                return;
            }

            const cardsHtml = coursesList.map(c => {
                const id = c.id || '';
                const title = c.title || 'بدون نام';
                const description = c.description || 'توضیحات این دوره به زودی اضافه خواهد شد.';
                const price = c.price ? Number(c.price).toLocaleString('fa-IR') : '۰';
                const imageUrl = c.image_url || 'https://via.placeholder.com/400x225?text=No+Image';

                const detailUrl = `courses-detail.html?id=${id}`;

                return `
                    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all duration-300 flex flex-col justify-between overflow-hidden">
                        <div>
                            <a href="${detailUrl}">
                                <img src="${imageUrl}" alt="${title}" class="w-full h-48 object-cover hover:opacity-95 transition-opacity">
                            </a>
                            <div class="p-6">
                                <a href="${detailUrl}" class="hover:text-indigo-600 transition-colors">
                                    <h3 class="font-bold text-xl text-gray-900">${title}</h3>
                                </a>
                                <p class="text-gray-500 text-sm mt-3 leading-relaxed line-clamp-3">${description}</p>
                            </div>
                        </div>
                        
                        <div class="mx-6 mb-6 pt-4 border-t border-gray-50 flex items-center justify-between">
                            <div>
                                <span class="font-black text-2xl text-indigo-600">${price}</span>
                                <span class="text-xs font-normal text-gray-400 mr-1">تومان</span>
                            </div>
                            <a href="${detailUrl}" class="bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition-all duration-200 inline-block">
                                مشاهده دوره
                            </a>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = cardsHtml;
        }

        document.addEventListener('DOMContentLoaded', loadCourses);
    </script>
</body>
</html>
